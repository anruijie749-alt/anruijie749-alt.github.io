<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="随机午餐大转盘，一键决定今天吃什么！">
    <meta name="keywords" content="午餐,转盘,随机,美食">
    <title>随机午餐大转盘</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D粒子背景画布 -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- 主容器 -->
    <div class="container">
        <p class="site-nav-top"><a href="index.html">← 返回乐龄品质生活首页</a></p>
        <!-- 标题 -->
        <h1 class="title">🍽️ 今天吃什么？</h1>
        <p class="subtitle">🎁 转盘抽奖，有机会获得外卖红包！每天都有惊喜，快来试试手气吧！</p>
        
        <!-- 大按钮区 -->
        <div class="button-area">
            <button id="spinBtn" class="btn-primary">🎯 一键决定</button>
            <button id="againBtn" class="btn-secondary" style="display: none;">🔄 再来一次</button>
        </div>
        <p class="tip-text">*温馨提示：抽中奖品将跳转至第三方平台领取优惠券。</p>
        
        <!-- CPS外卖红包：佣金链接在 lunch.js 的 CPS_LINKS.prizeLink 中配置，全球同一链接即可 -->
        <div class="button-area">
            <a
                href="https://www.ele.me/"
                class="btn-primary"
                target="_blank"
                rel="nofollow sponsored noopener noreferrer"
            >🧧 饿了么</a>
            <a
                href="https://waimai.meituan.com/"
                class="btn-secondary"
                target="_blank"
                rel="nofollow sponsored noopener noreferrer"
            >🛵 美团外卖</a>
            <a
                href="https://www.meituan.com/"
                class="btn-secondary"
                target="_blank"
                rel="nofollow sponsored noopener noreferrer"
            >🏠 美团首页</a>
        </div>
        <p class="region-note">🇨🇳 中国内地常用入口 above；红包/佣金以您在联盟后台生成的<strong>正式推广链接</strong>为准（填进 lunch.js）。</p>
        <h2 class="section-title" style="margin-top:8px; font-size:0.95rem;">🌏 海外用户 · 点餐入口（无地域屏蔽，按需选用）</h2>
        <div class="button-area">
            <a href="https://www.ubereats.com/" class="btn-secondary" target="_blank" rel="noopener noreferrer">Uber Eats</a>
            <a href="https://www.doordash.com/" class="btn-secondary" target="_blank" rel="noopener noreferrer">DoorDash</a>
            <a href="https://deliveroo.com/" class="btn-secondary" target="_blank" rel="noopener noreferrer">Deliveroo</a>
            <a href="https://www.just-eat.com/" class="btn-secondary" target="_blank" rel="noopener noreferrer">Just Eat</a>
        </div>
        
        <!-- 转盘显示区 -->
        <div class="wheel-container">
            <canvas id="wheelCanvas"></canvas>
        </div>
        
        <!-- 智能过滤区 -->
        <div class="filter-section">
            <h2 class="section-title">💰 预算控制</h2>
            <div class="budget-controls">
                <label class="budget-option">
                    <input type="radio" name="budget" value="20" checked>
                    <span>20元</span>
                </label>
                <label class="budget-option">
                    <input type="radio" name="budget" value="50">
                    <span>50元</span>
                </label>
                <label class="budget-option">
                    <input type="radio" name="budget" value="100">
                    <span>100元</span>
                </label>
            </div>
            
            <h2 class="section-title">🌶️ 口味偏好</h2>
            <div class="taste-controls">
                <label class="taste-option">
                    <input type="checkbox" name="taste" value="清淡">
                    <span>清淡</span>
                </label>
                <label class="taste-option">
                    <input type="checkbox" name="taste" value="中辣">
                    <span>中辣</span>
                </label>
                <label class="taste-option">
                    <input type="checkbox" name="taste" value="重辣">
                    <span>重辣</span>
                </label>
                <label class="taste-option">
                    <input type="checkbox" name="taste" value="素食">
                    <span>素食</span>
                </label>
            </div>
        </div>
        
        <!-- 智能推荐区 -->
        <div class="recommend-section">
            <h2 class="section-title">⭐ 今日推荐</h2>
            <div id="todayRecommend" class="recommend-item"></div>
            
            <h2 class="section-title">📜 最近吃过</h2>
            <div id="historyList" class="history-list"></div>
        </div>
        
        <!-- 餐谱目录按钮 -->
        <div class="menu-catalog-section">
            <button id="catalogBtn" class="btn-catalog">📋 查看二十多种餐谱目录</button>
        </div>
        
        <!-- 所有选项列表（隐藏，用于调试） -->
        <div id="allOptions" class="options-list" style="display: none;"></div>
    </div>
    
    <!-- 结果弹窗 -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 class="modal-title">恭喜你！</h2>
            <p class="modal-text" id="modalText">今天吃火锅！</p>
            <div class="modal-buttons">
                <button id="shareBtn" class="btn-share">📤 分享到微信</button>
                <button class="btn-close" onclick="closeModal()">确定</button>
            </div>
        </div>
    </div>
    
    <script src="lunch.js"></script>
</body>
</html>
